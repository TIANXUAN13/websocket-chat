{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - {{ site_title }}</title>
    {% if site_favicon_url %}<link rel="icon" href="{{ site_favicon_url }}">{% endif %}
    <link rel="stylesheet" href="{% static 'chat-ui.css' %}">
    <style>
        .playful-login-page {
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            background:
                radial-gradient(circle at top left, rgba(140, 103, 255, 0.12), transparent 26%),
                radial-gradient(circle at bottom right, rgba(255, 180, 122, 0.14), transparent 28%),
                linear-gradient(180deg, #f7f6fb 0%, #fff8f2 100%);
        }
        .playful-login-shell {
            width: min(1280px, 100%);
            min-height: calc(100vh - 48px);
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            border-radius: 36px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.72);
            background: rgba(255, 255, 255, 0.82);
            box-shadow: 0 30px 80px rgba(58, 37, 94, 0.16);
            backdrop-filter: blur(24px);
        }
        .playful-login-showcase {
            position: relative;
            overflow: hidden;
            padding: 34px 38px 34px;
            background: linear-gradient(135deg, #6c3ff5 0%, #5a34d1 45%, #4e2bb9 100%);
            color: #fff;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 20px;
        }
        .playful-login-showcase::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.65;
        }
        .playful-login-showcase::after {
            content: "";
            position: absolute;
            inset: auto auto 0 0;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            filter: blur(18px);
            transform: translate(-12%, 16%);
        }
        .playful-login-topline, .playful-login-copy, .playful-characters { position: relative; z-index: 1; }
        .playful-login-topline { display: flex; justify-content: space-between; align-items: center; gap: 16px; }
        .playful-login-brand { display: inline-flex; align-items: center; gap: 12px; font-size: 18px; font-weight: 800; }
        .playful-login-brand-mark {
            width: 40px; height: 40px; border-radius: 14px; display: grid; place-items: center;
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.16);
        }
        .playful-login-brand-mark svg { width: 18px; height: 18px; }
        .playful-characters { position: relative; min-height: 480px; }
        .playful-character {
            --look-x: 0px; --look-y: 0px; --face-x: 0px; --face-y: 0px; --mouth-x: 0px; --mouth-y: 0px;
            --body-skew: 0deg; --body-extra-skew: 0deg;
            position: absolute; bottom: 0;
            transform: skewX(calc(var(--body-skew) + var(--body-extra-skew)));
            transform-origin: bottom center;
            transition: transform 220ms ease, height 220ms ease, left 220ms ease;
        }
        .playful-character-purple { left: 82px; width: 188px; height: 388px; border-radius: 12px 12px 0 0; background: #6c3ff5; z-index: 1; }
        .playful-character-black { left: 252px; width: 128px; height: 304px; border-radius: 10px 10px 0 0; background: #242424; z-index: 2; }
        .playful-character-orange { left: 6px; width: 248px; height: 196px; border-radius: 128px 128px 0 0; background: #ff9b6b; z-index: 3; }
        .playful-character-yellow { left: 324px; width: 144px; height: 228px; border-radius: 72px 72px 0 0; background: #e8d754; z-index: 4; }
        .playful-eyes {
            position: absolute;
            display: flex;
            align-items: center;
            gap: 18px;
            transform: translate(var(--face-x), var(--face-y));
            transition: transform 120ms ease-out, left 220ms ease, top 220ms ease;
        }
        .playful-character-purple .playful-eyes { left: 46px; top: 42px; }
        .playful-character-black .playful-eyes { left: 28px; top: 34px; gap: 14px; }
        .playful-character-orange .playful-eyes { left: 88px; top: 92px; gap: 28px; }
        .playful-character-yellow .playful-eyes { left: 50px; top: 44px; gap: 22px; }
        .playful-eye {
            width: 18px; height: 18px; border-radius: 50%; background: #fff; display: grid; place-items: center;
            overflow: hidden; transition: height 120ms ease;
        }
        .playful-character-black .playful-eye { width: 16px; height: 16px; }
        .playful-character.is-blinking .playful-eye { height: 2px; }
        .playful-pupil, .playful-pupil-solid {
            border-radius: 50%; background: #242424; transform: translate(var(--look-x), var(--look-y));
            transition: transform 90ms ease-out;
        }
        .playful-pupil { width: 7px; height: 7px; }
        .playful-pupil-solid { width: 12px; height: 12px; }
        .playful-mouth {
            position: absolute;
            left: 40px;
            top: 94px;
            width: 64px;
            height: 4px;
            border-radius: 999px;
            background: #242424;
            transform: translate(var(--mouth-x), var(--mouth-y));
            transition: transform 120ms ease-out;
        }
        .playful-login-shell.has-active-field .playful-character-purple {
            --body-extra-skew: 0deg;
            height: 424px;
            transform: skewX(-14deg);
            transform-origin: 72% 100%;
        }
        .playful-login-shell.has-active-field .playful-character-black {
            --body-extra-skew: 0deg;
            transform: skewX(-12deg);
            transform-origin: 70% 100%;
        }
        .playful-login-shell.is-peeking .playful-character-purple,
        .playful-login-shell.is-peeking .playful-character-black,
        .playful-login-shell.is-peeking .playful-character-orange,
        .playful-login-shell.is-peeking .playful-character-yellow { transform: skewX(8deg); }
        .playful-login-copy h1 { margin: 0 0 12px; font-size: clamp(2.5rem, 5vw, 4rem); line-height: 0.96; letter-spacing: -0.05em; }
        .playful-login-panel {
            padding: 52px 44px; background: rgba(255,255,255,0.94); display: flex;
            flex-direction: column; justify-content: center;
        }
        .playful-login-brand-mobile { display: none; color: var(--text-strong); margin-bottom: 28px; }
        .playful-login-panel-head h2 { margin: 0; color: var(--text-strong); font-size: 2.2rem; letter-spacing: -0.04em; }
        .playful-login-panel-head p { margin: 10px 0 0; color: var(--text-muted); line-height: 1.7; }
        .playful-login-alert {
            margin-top: 22px; padding: 14px 16px; border-radius: 16px; background: rgba(194, 70, 53, 0.1);
            border: 1px solid rgba(194, 70, 53, 0.16); color: var(--danger); font-size: 14px; font-weight: 700;
        }
        .playful-login-form { margin-top: 32px; display: grid; gap: 20px; }
        .playful-field { display: grid; gap: 10px; }
        .playful-field .field-label {
            margin: 0;
            font-size: 14px;
            font-weight: 800;
            color: #46372d;
        }
        .playful-input {
            display: block;
            width: 100%;
            box-sizing: border-box;
            height: 64px;
            padding: 0 24px;
            border-radius: 999px;
            border: 1px solid rgba(120, 96, 80, 0.16);
            background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,248,242,0.84));
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.72),
                0 12px 26px rgba(92, 64, 46, 0.08);
            color: #2d231d;
            font-size: 16px;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
        }
        .playful-input::placeholder {
            color: rgba(93, 71, 58, 0.56);
        }
        .playful-input:focus {
            outline: none;
            border-color: rgba(108, 63, 245, 0.28);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.78),
                0 0 0 5px rgba(108, 63, 245, 0.08),
                0 16px 30px rgba(92, 64, 46, 0.1);
            transform: translateY(-1px);
        }
        .playful-password-wrap {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            isolation: isolate;
        }
        .playful-password-wrap .playful-input {
            padding-right: 78px;
        }
        .playful-toggle {
            position: absolute;
            top: 50%;
            right: 12px;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            margin: 0;
            padding: 0;
            border: 1px solid rgba(120, 96, 80, 0.12);
            border-radius: 999px;
            background: rgba(255,255,255,0.78);
            color: #7e6556;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(92, 64, 46, 0.08);
            z-index: 2;
        }
        .playful-toggle-icon {
            position: absolute;
            width: 18px;
            height: 18px;
        }
        .playful-toggle-icon[hidden] { display: none; }
        .playful-login-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
        .playful-checkbox { display: inline-flex; align-items: center; gap: 8px; color: var(--text-body); font-size: 14px; }
        .playful-login-tip { color: var(--text-muted); font-size: 13px; }
        .playful-login-submit {
            width: 100%;
            min-height: 64px;
            border: 1px solid rgba(163, 92, 56, 0.14);
            border-radius: 999px;
            background:
                linear-gradient(135deg, rgba(205, 115, 72, 0.96), rgba(178, 92, 56, 0.96)),
                rgba(255,255,255,0.14);
            color: #fffaf5;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0.02em;
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.26),
                0 20px 32px rgba(178, 92, 56, 0.24);
            backdrop-filter: blur(14px);
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
        }
        .playful-login-submit:hover {
            transform: translateY(-1px);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.26),
                0 24px 36px rgba(178, 92, 56, 0.28);
            filter: saturate(1.04);
        }
        .playful-login-footer { margin-top: 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; color: var(--text-muted); font-size: 14px; }
        .playful-login-footer p { margin: 0; }
        .playful-login-footer a { color: var(--text-strong); font-weight: 800; text-decoration: none; }
        @media (max-width: 980px) {
            .playful-login-page { padding: 14px; }
            .playful-login-shell { min-height: auto; grid-template-columns: 1fr; }
            .playful-login-showcase { min-height: 420px; padding: 24px 22px; }
            .playful-characters { min-height: 300px; transform: scale(0.78); transform-origin: center bottom; }
            .playful-login-copy h1 { font-size: 2.4rem; }
            .playful-login-panel { padding: 28px 22px 30px; }
            .playful-login-brand-mobile { display: inline-flex; }
        }
        @media (max-width: 640px) {
            .playful-login-showcase { display: none; }
            .playful-login-panel { padding: 24px 18px 26px; }
            .playful-login-panel-head h2 { font-size: 1.9rem; }
            .playful-login-row { align-items: flex-start; }
        }
    </style>
</head>
<body class="playful-login-page">
    <main class="playful-login-shell">
        <section class="playful-login-showcase">
            <div class="playful-login-topline">
                <div class="playful-login-brand">
                    <div class="playful-login-brand-mark">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                            <path d="M2 12l10 5 10-5"/>
                            <path d="M2 17l10 5 10-5"/>
                        </svg>
                    </div>
                    <span>{{ site_title }}</span>
                </div>
            </div>

            <div class="playful-characters" id="playful-characters">
                <div class="playful-character playful-character-purple" data-character="purple">
                    <div class="playful-eyes">
                        <div class="playful-eye"><span class="playful-pupil"></span></div>
                        <div class="playful-eye"><span class="playful-pupil"></span></div>
                    </div>
                </div>
                <div class="playful-character playful-character-black" data-character="black">
                    <div class="playful-eyes">
                        <div class="playful-eye"><span class="playful-pupil"></span></div>
                        <div class="playful-eye"><span class="playful-pupil"></span></div>
                    </div>
                </div>
                <div class="playful-character playful-character-orange" data-character="orange">
                    <div class="playful-eyes">
                        <div class="playful-pupil playful-pupil-solid"></div>
                        <div class="playful-pupil playful-pupil-solid"></div>
                    </div>
                </div>
                <div class="playful-character playful-character-yellow" data-character="yellow">
                    <div class="playful-eyes">
                        <div class="playful-pupil playful-pupil-solid"></div>
                        <div class="playful-pupil playful-pupil-solid"></div>
                    </div>
                    <div class="playful-mouth"></div>
                </div>
            </div>

            <div class="playful-login-copy">
                <h1>欢迎回来</h1>
            </div>
        </section>

        <section class="playful-login-panel">
            <div class="playful-login-panel-head">
                <div class="playful-login-brand playful-login-brand-mobile">
                    <div class="playful-login-brand-mark">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                            <path d="M2 12l10 5 10-5"/>
                            <path d="M2 17l10 5 10-5"/>
                        </svg>
                    </div>
                    <span>{{ site_title }}</span>
                </div>
                <h2>登录账号</h2>
                <p>输入你已有的用户名和密码，马上回到聊天页。</p>
            </div>

            {% if form.errors %}
                <div class="playful-login-alert">
                    用户名或密码错误，请重新输入。
                </div>
            {% endif %}

            <form class="playful-login-form" method="post">
                {% csrf_token %}
                <div class="playful-field">
                    <label class="field-label" for="id_username">用户名</label>
                    <input
                        class="form-input playful-input"
                        id="id_username"
                        type="text"
                        name="username"
                        value="{{ form.username.value|default:'' }}"
                        placeholder="请输入用户名"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="playful-field">
                    <label class="field-label" for="id_password">密码</label>
                    <div class="playful-password-wrap">
                        <input
                            class="form-input playful-input"
                            id="id_password"
                            type="password"
                            name="password"
                            placeholder="请输入密码"
                            autocomplete="current-password"
                            required
                        >
                        <button class="playful-toggle" type="button" id="password-visibility-toggle" aria-label="显示或隐藏密码">
                            <svg class="playful-toggle-icon playful-toggle-icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="playful-toggle-icon playful-toggle-icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" hidden>
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                <path d="M14.12 14.12A3 3 0 0 1 9.88 9.88"/>
                                <path d="M1 1l22 22"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="playful-login-row">
                    <label class="playful-checkbox">
                        <input type="checkbox" name="remember_me">
                        <span>记住我</span>
                    </label>
                    <span class="playful-login-tip">登录后会进入你的聊天大厅</span>
                </div>

                <button class="btn btn-primary playful-login-submit" type="submit">登录</button>
            </form>

            <div class="playful-login-footer">
                <p>还没有账号？</p>
                <a href="{% url 'register' %}">立即注册</a>
            </div>
        </section>
    </main>

    <script>
        const loginShell = document.querySelector('.playful-login-shell');
        const characters = Array.from(document.querySelectorAll('[data-character]'));
        const usernameInput = document.getElementById('id_username');
        const passwordInput = document.getElementById('id_password');
        const passwordVisibilityToggle = document.getElementById('password-visibility-toggle');
        const eyeIcon = document.querySelector('.playful-toggle-icon-eye');
        const eyeOffIcon = document.querySelector('.playful-toggle-icon-eye-off');
        const characterMotionConfig = {
            purple: { faceDivX: 20, faceDivY: 30, faceMaxX: 15, faceMaxY: 10, lookDivX: 26, lookDivY: 34, lookMaxX: 5, lookMaxY: 5, bodyDivX: 120, bodyMax: 6 },
            black: { faceDivX: 24, faceDivY: 30, faceMaxX: 10, faceMaxY: 8, lookDivX: 28, lookDivY: 36, lookMaxX: 4, lookMaxY: 4, bodyDivX: 120, bodyMax: 6 },
            orange: { faceDivX: 20, faceDivY: 30, faceMaxX: 15, faceMaxY: 10, lookDivX: 24, lookDivY: 32, lookMaxX: 5, lookMaxY: 4, bodyDivX: 120, bodyMax: 6 },
            yellow: { faceDivX: 20, faceDivY: 30, faceMaxX: 15, faceMaxY: 10, lookDivX: 24, lookDivY: 32, lookMaxX: 5, lookMaxY: 4, bodyDivX: 120, bodyMax: 6 },
        };
        let lastMouseX = window.innerWidth * 0.35;
        let lastMouseY = window.innerHeight * 0.45;

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function refreshCharacterMotion() {
            if (!loginShell) return;
            const isPeeking = loginShell.classList.contains('is-peeking');
            const hasActiveField = loginShell.classList.contains('has-active-field');

            characters.forEach((character) => {
                const type = character.dataset.character;
                const config = characterMotionConfig[type];
                if (!config) return;

                const rect = character.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 3;
                const deltaX = lastMouseX - centerX;
                const deltaY = lastMouseY - centerY;

                let faceX = clamp(deltaX / config.faceDivX, -config.faceMaxX, config.faceMaxX);
                let faceY = clamp(deltaY / config.faceDivY, -config.faceMaxY, config.faceMaxY);
                let lookX = clamp(deltaX / config.lookDivX, -config.lookMaxX, config.lookMaxX);
                let lookY = clamp(deltaY / config.lookDivY, -config.lookMaxY, config.lookMaxY);
                let bodySkew = clamp(-deltaX / config.bodyDivX, -config.bodyMax, config.bodyMax);

                if (hasActiveField) {
                    if (type === 'purple') {
                        faceX = 8;
                        faceY = 4;
                        lookX = 4;
                        lookY = 4;
                    } else if (type === 'black') {
                        faceX = 6;
                        faceY = 2;
                        lookX = 3;
                        lookY = 2;
                    }
                }

                if (isPeeking) {
                    if (type === 'purple') {
                        faceX = -24;
                        faceY = -7;
                        lookX = -4;
                        lookY = -4;
                    } else if (type === 'black') {
                        faceX = -16;
                        faceY = -6;
                        lookX = -4;
                        lookY = -4;
                    } else if (type === 'orange' || type === 'yellow') {
                        faceX = -32;
                        faceY = -5;
                        lookX = -5;
                        lookY = -4;
                    }
                }

                character.style.setProperty('--face-x', `${faceX}px`);
                character.style.setProperty('--face-y', `${faceY}px`);
                character.style.setProperty('--look-x', `${lookX}px`);
                character.style.setProperty('--look-y', `${lookY}px`);
                character.style.setProperty('--mouth-x', `${faceX}px`);
                character.style.setProperty('--mouth-y', `${faceY}px`);
                character.style.setProperty('--body-skew', `${bodySkew}deg`);
            });
        }

        function updateShellState() {
            if (!loginShell || !passwordInput || !usernameInput) return;
            const hasActiveField = document.activeElement === usernameInput || document.activeElement === passwordInput;
            const isPeeking = passwordInput.value.trim().length > 0 && passwordInput.type === 'text';
            loginShell.classList.toggle('has-active-field', hasActiveField);
            loginShell.classList.toggle('is-peeking', isPeeking);
            refreshCharacterMotion();
        }

        window.addEventListener('mousemove', (event) => {
            lastMouseX = event.clientX;
            lastMouseY = event.clientY;
            refreshCharacterMotion();
        });

        if (usernameInput) {
            usernameInput.addEventListener('focus', updateShellState);
            usernameInput.addEventListener('input', updateShellState);
            usernameInput.addEventListener('blur', updateShellState);
        }

        if (passwordInput) {
            passwordInput.addEventListener('focus', updateShellState);
            passwordInput.addEventListener('input', updateShellState);
            passwordInput.addEventListener('blur', updateShellState);
        }

        if (passwordVisibilityToggle && passwordInput) {
            passwordVisibilityToggle.addEventListener('click', () => {
                const nextType = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = nextType;
                if (eyeIcon) {
                    eyeIcon.hidden = nextType === 'text';
                }
                if (eyeOffIcon) {
                    eyeOffIcon.hidden = nextType !== 'text';
                }
                updateShellState();
            });
        }

        updateShellState();
        refreshCharacterMotion();

        let blinkToggle = false;
        window.setInterval(() => {
            blinkToggle = !blinkToggle;
            characters.forEach((character, index) => {
                if ((index + Number(blinkToggle)) % 2 === 0) {
                    character.classList.add('is-blinking');
                    window.setTimeout(() => character.classList.remove('is-blinking'), 160);
                }
            });
        }, 3200);
    </script>
</body>
</html>
