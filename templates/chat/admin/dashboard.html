{% extends 'chat/admin/base.html' %}

{% block title %}管理员仪表板{% endblock %}

{% block content %}
<div class="page-heading">
    <span class="section-label">Admin Overview</span>
    <h1>管理员仪表板</h1>
    <p>从这里快速查看用户、房间和会话的整体状态，再进入细分页面做管理操作。</p>
</div>

<div class="admin-sections">
    <div class="stats-grid">
        <div class="stat-card panel-card">
            <h3>总用户数</h3>
            <div class="stat-number">{{ total_users }}</div>
        </div>
        <div class="stat-card panel-card">
            <h3>总房间数</h3>
            <div class="stat-number">{{ total_rooms }}</div>
        </div>
        <div class="stat-card panel-card">
            <h3>活跃会话</h3>
            <div class="stat-number">{{ total_sessions }}</div>
        </div>
    </div>

    <div class="section panel-card">
        <h2>快速导航</h2>
        <div class="nav-links">
            <a href="{% url 'admin_site_settings' %}" class="nav-link">站点设置</a>
            <a href="{% url 'admin_users' %}" class="nav-link">用户管理</a>
            <a href="{% url 'admin_rooms' %}" class="nav-link">房间管理</a>
            <a href="{% url 'admin_sessions' %}" class="nav-link">会话管理</a>
            <a href="/admin/" class="nav-link">Django Admin</a>
        </div>
    </div>

</div>
{% endblock %}
